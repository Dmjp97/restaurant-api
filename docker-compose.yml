version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant_api
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html/app
      - ./public:/var/www/html/public
      - ./docker/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf
      - ./writable:/var/www/html/writable
    environment:
      - CI_ENVIRONMENT=development
      - JWT_SECRET=super-secret-key-change-in-production-min-32-chars
      - app.baseURL=http://localhost:8080
      - MYSQLHOST=db
      - MYSQLUSER=restaurant_user
      - MYSQLPASSWORD=secret
      - MYSQLDATABASE=restaurant_platform
      - MYSQLPORT=3306
      - REDISHOST=redis
    depends_on:
      - db
      - redis
    networks:
      - restaurant_network

  db:
    image: mysql:8.0
    container_name: restaurant_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: restaurant_platform
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: restaurant_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - restaurant_network

  redis:
    image: redis:7-alpine
    container_name: restaurant_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - restaurant_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: restaurant_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
    networks:
      - restaurant_network

networks:
  restaurant_network:
    driver: bridge

volumes:
  mysql_data:
